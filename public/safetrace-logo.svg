<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="600" height="380"
     viewBox="0 0 600 380"
     role="img">
  <title>SafeTrace</title>
  <desc>SafeTrace cybersecurity learning platform logo — shield with hexagon network mark and circuit trace path</desc>

  <defs>
    <clipPath id="shieldClip">
      <path d="M300 30 L355 52 L355 118 Q355 166 300 190 Q245 166 245 118 L245 52 Z"/>
    </clipPath>
  </defs>

  <!-- Dark background card -->
  <rect x="0" y="0" width="600" height="380" rx="16" fill="#0a0e27"/>

  <!-- ── Shield outer stroke ── -->
  <path d="M300 30 L355 52 L355 118 Q355 166 300 190 Q245 166 245 118 L245 52 Z"
        fill="#0a0e27" stroke="#00ffff" stroke-width="2.5"/>
  <path d="M300 30 L355 52 L355 118 Q355 166 300 190 Q245 166 245 118 L245 52 Z"
        fill="#00ffff0d"/>

  <!-- ── Outer hexagon (radius 38, centred 300,110) ── -->
  <polygon points="300,72 333,91 333,129 300,148 267,129 267,91"
           fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.5"/>

  <!-- ── Inner hexagon (radius 20) ── -->
  <polygon points="300,90 317,100 317,120 300,130 283,120 283,100"
           fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- ── Spokes: inner→outer vertices ── -->
  <line x1="300" y1="90"  x2="300" y2="72"  stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  <line x1="317" y1="100" x2="333" y2="91"  stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  <line x1="317" y1="120" x2="333" y2="129" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="130" x2="300" y2="148" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  <line x1="283" y1="120" x2="267" y2="129" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  <line x1="283" y1="100" x2="267" y2="91"  stroke="#00ffff" stroke-width="1" opacity="0.6"/>

  <!-- ── Node dots at inner hex vertices ── -->
  <circle cx="300" cy="90"  r="3" fill="#00ffff"/>
  <circle cx="317" cy="100" r="3" fill="#00ff88"/>
  <circle cx="317" cy="120" r="3" fill="#00ffff"/>
  <circle cx="300" cy="130" r="3" fill="#00ff88"/>
  <circle cx="283" cy="120" r="3" fill="#00ffff"/>
  <circle cx="283" cy="100" r="3" fill="#00ff88"/>

  <!-- ── Circuit trace path through hex centre ── -->
  <polyline points="273,110 283,100 293,110 300,103 307,110 317,100 327,110"
            fill="none" stroke="#00ff88" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="273" cy="110" r="3.5" fill="#00ff88"/>
  <circle cx="327" cy="110" r="3.5" fill="#00ffff"/>

  <!-- ── Centre pulse dot ── -->
  <circle cx="300" cy="110" r="5"   fill="#00ffff" opacity="0.9"/>
  <circle cx="300" cy="110" r="2.5" fill="#ffffff"/>

  <!-- ── Checkmark in lower shield ── -->
  <path d="M283 162 L293 172 L318 152"
        fill="none" stroke="#00ff88" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ══ WORDMARK ══ -->
  <text x="300" y="233"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700"
        fill="#00ffff"
        text-anchor="middle"
        letter-spacing="8">SAFE</text>

  <text x="300" y="278"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700"
        fill="#00ff88"
        text-anchor="middle"
        letter-spacing="8">TRACE</text>

  <!-- Rule -->
  <line x1="160" y1="292" x2="440" y2="292" stroke="#1a2a4a" stroke-width="1"/>

  <!-- Tagline -->
  <text x="300" y="314"
        font-family="'Courier New', Courier, monospace"
        font-size="11"
        fill="#445577"
        text-anchor="middle"
        letter-spacing="3">LEARN  ·  SIMULATE  ·  STAY SAFE</text>

  <!-- Attribution -->
  <text x="300" y="344"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        fill="#2a3a5a"
        text-anchor="middle"
        letter-spacing="1">by Adwitiya Mukhopadhyay</text>

</svg>
